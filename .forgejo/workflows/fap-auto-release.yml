name: FAP Build & Auto Release

on:
  push:
    tags:
      - 'b*'

permissions:
  contents: write

concurrency:
  group: auto-release-${{ forgejo.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    if: ${{ github.server_url == 'https://git.aperturefox.ru' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout firmware repository
        uses: actions/checkout@v4
        with:
          repository: FlipperZero/unleashed-firmware
          ref: release
          path: firmware
          fetch-depth: 1
          fetch-tags: false
          submodules: recursive
          token: ${{ secrets.FORGEJO_TOKEN }}

      - name: Checkout applications repository
        uses: actions/checkout@v4
        with:
          repository: FlipperZero/MyFlipperApps
          path: repo
          fetch-depth: 1
          fetch-tags: false
          submodules: recursive
          token: ${{ secrets.FORGEJO_TOKEN }}

      - name: Search and edit manifests
        id: gen-manifest
        shell: bash
        run: |
          set -euo pipefail
          python3 repo/.forgejo/scripts/prepare_manifests.py

      - name: Extract firmware metadata
        id: firmware-meta
        shell: bash
        run: |
          set -euo pipefail
          bash repo/.forgejo/scripts/firmware_meta.sh firmware

      - name: Build all applications
        id: build-apps
        shell: bash
        env:
          APP_IDS: ${{ steps.gen-manifest.outputs.app_ids }}
        run: |
          set -euo pipefail
          bash repo/.forgejo/scripts/build_apps.sh firmware

      - name: Collect FAP artifacts
        shell: bash
        env:
          APP_IDS: ${{ steps.gen-manifest.outputs.app_ids }}
        run: |
          set -euo pipefail
          bash repo/.forgejo/scripts/collect_faps.sh firmware artifacts

      - name: Upload release
        shell: bash
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          FORGEJO_SERVER_URL: ${{ forgejo.server_url }}
          FORGEJO_REPO: ${{ forgejo.repository }}
          TAG: ${{ forgejo.ref_name }}
          GIT_SHA: ${{ forgejo.sha }}
          FW_VERSION: ${{ steps.firmware-meta.outputs.fw_version }}
          API_VERSION: ${{ steps.build-apps.outputs.api_version }}
        run: |
          set -euo pipefail
          bash repo/.forgejo/scripts/publish_release.sh artifacts
