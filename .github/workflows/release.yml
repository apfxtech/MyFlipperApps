name: "Release"
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.server_url == 'https://github.com' }}
    name: Build apps, update catalog and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Set up ufbt SDK (dev channel)
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        with:
          task: setup
          sdk-channel: dev
          sdk-index-url: https://up.unleashedflip.com/directory.json

      - name: Build apps and generate cards
        run: python3 .github/scripts/build.py

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update cards catalog [skip ci]"
            git push origin HEAD:main
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: artifacts/*.fap
          fail_on_unmatched_files: true
