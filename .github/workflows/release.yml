name: "Release"
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check GitHub status
        run: |
          indicator=$(curl -sf https://www.githubstatus.com/api/v2/status.json | python3 -c "import sys, json; print(json.load(sys.stdin)['status']['indicator'])")
          echo "GitHub status: $indicator"
          if [ "$indicator" = "major" ] || [ "$indicator" = "critical" ]; then
            echo "GitHub is having an outage, aborting."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up ufbt SDK (dev channel)
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        with:
          task: setup
          sdk-channel: dev
          sdk-index-url: https://up.unleashedflip.com/directory.json

      - name: Build all apps
        run: |
          mkdir -p artifacts
          for dir in projects/*/*/ ; do
            [ -f "${dir}application.fam" ] || continue
            name="${dir%/}"
            echo "::group::Build ${name}"
            if ( cd "$dir" && ufbt ); then
              find "$dir" -path '*/dist/*.fap' -exec cp {} artifacts/ \;
            else
              echo "::warning::Build failed for ${name}, skipping"
            fi
            echo "::endgroup::"
          done
          echo "Built artifacts:"
          ls -la artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*.fap
          fail_on_unmatched_files: true
